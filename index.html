<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>叮咚~</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="WD.jpg" fetchpriority="high">
  <style>
    :root {
      --bg-primary: #f5f0e8;
      --bg-secondary: #e8e0d4;
      --fg-primary: #2c2416;
      --fg-secondary: #5a4d3a;
      --accent: #c17f59;
      --accent-light: #d4a882;
      --card-bg: #fffcf7;
      --shadow: rgba(44, 36, 22, 0.12);
      --border: #d4c9b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg-primary);
      color: var(--fg-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .bg-texture {
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(ellipse at 20% 30%, rgba(193, 127, 89, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(212, 168, 130, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-noise {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      padding: 20px;
      text-align: center;
      opacity: 0;
      animation: fadeSlideDown 0.6s ease-out 0.2s forwards;
    }

    @media (min-width: 768px) {
      header {
        padding: 32px 40px;
      }
    }

    .header-title {
      font-size: clamp(1.25rem, 5vw, 1.75rem);
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--fg-primary);
    }

    .header-subtitle {
      margin-top: 8px;
      font-size: clamp(0.8rem, 3vw, 0.9rem);
      color: var(--fg-secondary);
      font-weight: 400;
    }

    .image-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    @media (min-width: 768px) {
      .image-section {
        padding: 24px 40px;
      }
    }

    .image-wrapper {
      position: relative;
      width: 100%;
      max-width: 600px;
      opacity: 0;
      animation: fadeScaleIn 0.8s ease-out 0.4s forwards;
    }

    .image-frame {
      position: relative;
      background: var(--card-bg);
      padding: 12px;
      border-radius: 4px;
      box-shadow: 
        0 4px 20px var(--shadow),
        0 12px 40px rgba(44, 36, 22, 0.08);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
    }

    @media (min-width: 768px) {
      .image-frame {
        padding: 16px;
        border-radius: 6px;
      }
    }

    .image-frame:hover {
      transform: translateY(-4px);
      box-shadow: 
        0 8px 30px var(--shadow),
        0 20px 60px rgba(44, 36, 22, 0.12);
    }

    .image-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid var(--border);
      border-radius: inherit;
      pointer-events: none;
    }

    .image-container {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 2px;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
    }

    .image-container::before {
      content: '';
      display: block;
      padding-top: 100%;
    }

    .main-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.5s ease;
      cursor: pointer;
      touch-action: manipulation;
      content-visibility: auto;
    }

    .main-image.loaded {
      opacity: 1;
    }

    .loading-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
    }

    .loading-placeholder.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .progress-container {
      width: 60%;
      max-width: 200px;
    }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
      animation: progressPulse 1.5s ease-in-out infinite;
    }

    @keyframes progressPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .loading-text {
      font-size: 0.8rem;
      color: var(--fg-secondary);
    }

    .image-info {
      margin-top: 12px;
      text-align: center;
    }

    @media (min-width: 768px) {
      .image-info {
        margin-top: 16px;
      }
    }

    .image-hint {
      font-size: clamp(0.75rem, 3vw, 0.8rem);
      color: var(--accent);
      opacity: 0.8;
    }

    /* 全屏遮罩 */
    .fullscreen-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(44, 36, 22, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .fullscreen-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .fullscreen-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .fullscreen-overlay.active .fullscreen-image {
      transform: scale(1);
    }

    .fullscreen-close {
      position: absolute;
      top: calc(16px + env(safe-area-inset-top));
      right: calc(16px + env(safe-area-inset-right));
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .fullscreen-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .fullscreen-close:active {
      transform: scale(0.95);
    }

    .fullscreen-close svg {
      width: 24px;
      height: 24px;
      stroke: #f5f0e8;
      stroke-width: 2;
    }

    /* 操作按钮栏 - 重构样式 */
    .action-bar {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* 移动端按钮基础样式 */
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      min-width: 72px;
      height: 44px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 22px;
      color: #f5f0e8;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      flex-shrink: 0;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .action-btn:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.3);
    }

    /* 平板和电脑端按钮样式 */
    @media (min-width: 768px) {
      .action-bar {
        gap: 14px;
        bottom: calc(24px + env(safe-area-inset-bottom));
      }

      .action-btn {
        padding: 10px 22px;
        min-width: 80px;
        height: 42px;
        font-size: 15px;
        border-radius: 21px;
      }
    }

    /* 大屏幕样式 */
    @media (min-width: 1024px) {
      .action-bar {
        gap: 16px;
      }

      .action-btn {
        padding: 10px 24px;
        min-width: 88px;
        height: 44px;
        font-size: 15px;
      }
    }

    /* 小屏手机优化 */
    @media (max-width: 360px) {
      .action-bar {
        gap: 8px;
      }

      .action-btn {
        padding: 10px 14px;
        min-width: 64px;
        height: 42px;
        font-size: 13px;
      }
    }

    /* 横屏模式 */
    @media (orientation: landscape) and (max-height: 500px) {
      .action-bar {
        bottom: calc(12px + env(safe-area-inset-bottom));
        gap: 8px;
      }

      .action-btn {
        padding: 8px 14px;
        min-width: 60px;
        height: 36px;
        font-size: 13px;
        border-radius: 18px;
      }

      .fullscreen-close {
        top: calc(12px + env(safe-area-inset-top));
        right: calc(12px + env(safe-area-inset-right));
        width: 38px;
        height: 38px;
      }
    }

    @keyframes fadeSlideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeScaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      
      .main-image {
        opacity: 1;
      }
      
      header, .image-wrapper {
        opacity: 1;
      }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      .image-section {
        padding: 12px 16px;
      }
      
      header {
        padding: 12px 20px;
      }
      
      .image-frame {
        padding: 8px;
      }
      
      .image-info {
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-texture"></div>
  <div class="bg-noise"></div>
  
  <div class="container">
    <header>
      <h1 class="header-title">叮咚~</h1>
    </header>
    
    <main class="image-section">
      <div class="image-wrapper">
        <div class="image-frame" id="imageFrame">
          <div class="image-container">
            <div class="loading-placeholder" id="loadingPlaceholder">
              <div class="progress-container">
                <div class="progress-bar">
                  <div class="progress-fill" id="progressFill"></div>
                </div>
              </div>
              <span class="loading-text" id="loadingText">加载中...</span>
            </div>
            <img 
              src="WD.jpg" 
              alt="WD图片" 
              class="main-image" 
              id="mainImage"
              loading="eager"
              decoding="async"
            >
          </div>
          <div class="image-info">
            <p class="image-hint">轻触放大查看</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="fullscreen-overlay" id="fullscreenOverlay">
    <button class="fullscreen-close" id="closeBtn" aria-label="关闭全屏">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <img src="WD.jpg" alt="WD图片全屏" class="fullscreen-image" id="fullscreenImage">
    <div class="action-bar">
      <button class="action-btn" id="zoomInBtn">放大</button>
      <button class="action-btn" id="zoomOutBtn">缩小</button>
      <button class="action-btn" id="resetBtn">重置</button>
    </div>
  </div>

  <script>
    const mainImage = document.getElementById('mainImage');
    const loadingPlaceholder = document.getElementById('loadingPlaceholder');
    const progressFill = document.getElementById('progressFill');
    const loadingText = document.getElementById('loadingText');
    const fullscreenOverlay = document.getElementById('fullscreenOverlay');
    const fullscreenImage = document.getElementById('fullscreenImage');
    const closeBtn = document.getElementById('closeBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const resetBtn = document.getElementById('resetBtn');

    let currentScale = 1;
    const scaleStep = 0.25;
    const minScale = 0.5;
    const maxScale = 3;

    let fakeProgress = 0;
    let progressInterval = null;

    function startFakeProgress() {
      progressInterval = setInterval(() => {
        if (fakeProgress < 90) {
          fakeProgress += Math.random() * 15;
          if (fakeProgress > 90) fakeProgress = 90;
          progressFill.style.width = fakeProgress + '%';
        }
      }, 200);
    }

    function finishProgress() {
      if (progressInterval) {
        clearInterval(progressInterval);
      }
      fakeProgress = 100;
      progressFill.style.width = '100%';
    }

    mainImage.addEventListener('load', function() {
      finishProgress();
      setTimeout(() => {
        loadingPlaceholder.classList.add('hidden');
        mainImage.classList.add('loaded');
      }, 100);
    });

    mainImage.addEventListener('error', function() {
      if (progressInterval) clearInterval(progressInterval);
      loadingPlaceholder.innerHTML = `
        <div style="text-align: center; color: var(--fg-secondary);">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <p style="margin-top: 12px; font-size: 0.9rem;">图片加载失败</p>
          <p style="margin-top: 4px; font-size: 0.75rem; opacity: 0.7;">请检查 WD.jpg 是否存在</p>
        </div>
      `;
    });

    startFakeProgress();

    function openFullscreen() {
      fullscreenOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      currentScale = 1;
      updateTransform();
    }

    function closeFullscreen() {
      fullscreenOverlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    function updateTransform() {
      fullscreenImage.style.transform = `scale(${currentScale})`;
    }

    function zoomIn() {
      if (currentScale < maxScale) {
        currentScale = Math.min(maxScale, currentScale + scaleStep);
        updateTransform();
      }
    }

    function zoomOut() {
      if (currentScale > minScale) {
        currentScale = Math.max(minScale, currentScale - scaleStep);
        updateTransform();
      }
    }

    function resetZoom() {
      currentScale = 1;
      updateTransform();
    }

    mainImage.addEventListener('click', openFullscreen);
    closeBtn.addEventListener('click', closeFullscreen);

    fullscreenOverlay.addEventListener('click', function(e) {
      if (e.target === fullscreenOverlay) {
        closeFullscreen();
      }
    });

    zoomInBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      zoomIn();
    });

    zoomOutBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      zoomOut();
    });

    resetBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      resetZoom();
    });

    document.addEventListener('keydown', function(e) {
      if (fullscreenOverlay.classList.contains('active')) {
        if (e.key === 'Escape') {
          closeFullscreen();
        } else if (e.key === '+' || e.key === '=') {
          zoomIn();
        } else if (e.key === '-') {
          zoomOut();
        } else if (e.key === '0') {
          resetZoom();
        }
      }
    });

    // 鼠标滚轮缩放（电脑端）
    fullscreenOverlay.addEventListener('wheel', function(e) {
      if (fullscreenOverlay.classList.contains('active')) {
        e.preventDefault();
        if (e.deltaY < 0) {
          zoomIn();
        } else {
          zoomOut();
        }
      }
    }, { passive: false });

    let initialDistance = 0;
    let initialScale = 1;

    fullscreenOverlay.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        initialDistance = Math.sqrt(dx * dx + dy * dy);
        initialScale = currentScale;
      }
    }, { passive: false });

    fullscreenOverlay.addEventListener('touchmove', function(e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (initialDistance > 0) {
          const scale = initialScale * (distance / initialDistance);
          currentScale = Math.max(minScale, Math.min(maxScale, scale));
          updateTransform();
        }
      }
    }, { passive: false });

    if (mainImage.complete && mainImage.naturalHeight !== 0) {
      if (progressInterval) clearInterval(progressInterval);
      loadingPlaceholder.classList.add('hidden');
      mainImage.classList.add('loaded');
    }
  </script>
</body>
</html>
